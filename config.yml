title: "Kaiyan M. Lee"
baseURL: "https://kaiyanlee.github.io/"
buildFuture: true
disableHugoGeneratorInject: true
disableLiveReload: true
includeNewer: true
languageCode: "en-us"
preserveTaxonomyNames: true
pygmentsStyle: "monokai"
enableRobotsTXT: true
pluralizeListTitles: false
pygmentsCodeFences: true
pygmentsCodefencesGuessSyntax: false
summarylength: 30

permalinks:
  posts = "/:year/:filename/"

module:
  mounts:
    - source: content
      target: content
    - source: content
      target: assets
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: assets
      target: assets
    - source: i18n
      target: i18n
    - source: archetypes
      target: archetypes

